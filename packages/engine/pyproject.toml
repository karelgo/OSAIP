[project]
name = "osaip-engine"
version = "0.1.0"
description = "OSAIP engine: DuckDB adapters, storage interface, connection checks"
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.30",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["osaip_engine"]
