[project]
name = "osaip-engine"
version = "0.1.0"
description = "OSAIP engine: DuckDB adapters, storage interface, connection checks"
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.30",
    # Exact pin — extension ABI/inference/profile stability (ADR-0006 §3)
    "duckdb==1.5.5",
    "pyarrow>=20.0",
    "boto3>=1.38",
    "anyio>=4.9",
    # Recipe compilation (Phase 2). sqlglot pinned explicitly — ibis's upper
    # bound floats and the SQL validator is built on sqlglot's parse tree (ADR-0007).
    "ibis-framework[duckdb]>=12,<13",
    "sqlglot>=30,<31",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["osaip_engine"]
