[project]
name = "osaip-shared"
version = "0.1.0"
description = "OSAIP shared pydantic models, constants, and helpers"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.11",
    "uuid6>=2024.7.10",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["osaip_shared"]
