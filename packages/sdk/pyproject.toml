[project]
name = "osaip"
version = "0.2.0"
description = "OSAIP SDK — the sandboxed-recipe IO broker (osaip.input/output); .llm/.agent/.semantic land in later phases"
requires-python = ">=3.12"
# The baseline sandbox venv installs the SDK + pyarrow so recipes can read/write
# parquet with no ambient credentials (ADR-0007 §5).
dependencies = [
    "pyarrow>=20.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["osaip"]
