name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy --strict packages/shared apps/api/osaip_api apps/worker/osaip_worker
      - run: uv run pytest

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build

  # Slice 10 adds: e2e (compose + seed + Playwright incl. axe, mobile, visual smoke),
  # SBOM (cyclonedx-bom + cdxgen), pip-audit + pnpm audit, license allowlist gate,
  # bundle-size gate, OpenAPI ADR lint (vendored spectral ruleset), api-client drift gate.
